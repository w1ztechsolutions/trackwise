<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - TrackWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.3);
        }
        .brand-icon i {
            font-size: 1.75rem;
            color: #fff;
        }
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f1f5f9;
            text-align: center;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }
        .login-card .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .form-label {
            color: #cbd5e1;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #dc3545;
            color: #f1f5f9;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.15);
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .btn-login {
            background: linear-gradient(135deg, #dc3545, #bb2d3b);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.875rem;
            border-radius: 10px;
            width: 100%;
            margin-top: 0.5rem;
            transition: all 0.2s ease;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #bb2d3b, #a52834);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.35);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #94a3b8;
            text-decoration: none;
        }
        .alert {
            border-radius: 10px;
            border: none;
            font-size: 0.875rem;
            padding: 0.75rem 1rem;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
        }
        .alert-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-icon">
                <i class="bi bi-shield-lock"></i>
            </div>
            <h1>Super Admin</h1>
            <p class="subtitle">Platform Administration Portal</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('superadmin.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required autofocus autocomplete="email" placeholder="admin@trackwise.app">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <a href="{{ url_for('auth.login') }}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i> Back to Business Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
