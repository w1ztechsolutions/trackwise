{% extends "sa_base.html" %}
{% block title %}{{ 'Edit' if business else 'Create' }} Business{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">{{ 'Edit' if business else 'Create' }} Business</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Business Name *</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ business.name if business else '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label for="tax_id" class="form-label">Tax ID</label>
                            <input type="text" class="form-control" id="tax_id" name="tax_id" value="{{ business.tax_id if business else '' }}">
                        </div>
                        <div class="mb-3">
                            <label for="currency" class="form-label">Currency</label>
                            <select class="form-select" id="currency" name="currency">
                                <option value="MWK" {% if business and business.currency == 'MWK' %}selected{% endif %}>MWK - Malawian Kwacha</option>
                                <option value="USD" {% if business and business.currency == 'USD' %}selected{% endif %}>USD - US Dollar</option>
                                <option value="ZAR" {% if business and business.currency == 'ZAR' %}selected{% endif %}>ZAR - South African Rand</option>
                                <option value="GBP" {% if business and business.currency == 'GBP' %}selected{% endif %}>GBP - British Pound</option>
                                <option value="EUR" {% if business and business.currency == 'EUR' %}selected{% endif %}>EUR - Euro</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('superadmin.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">{{ 'Update' if business else 'Create' }} Business</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
