{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="glass-card" style="max-width: 420px; margin: 80px auto; padding: 32px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="font-weight: 700; font-size: 24px;">Welcome to TrackWise</h1>
        <p style="color: var(--text-muted); font-size: 13px;">Sign in to continue</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
        {{ csrf_token() }}
        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" required class="form-control" autofocus>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" required class="form-control">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
    </form>
</div>
{% endblock %}
