{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="glass-card auth-card">
    <div class="auth-header">
        <h1>Welcome to TrackWise</h1>
        <p class="text-muted">Sign in to continue</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="business_name">Business name</label>
            <input type="text" id="business_name" name="business_name" required class="form-control" autocomplete="organization" autofocus>
        </div>

        <div class="form-group">

            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" required class="form-control" autofocus autocomplete="email">

        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" required class="form-control" autocomplete="current-password">

        </div>
        <button type="submit" class="btn-primary">Sign In</button>

        <div class="auth-footer">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
    </form>
</div>
{% endblock %}
