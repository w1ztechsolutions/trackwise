{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="glass-card" style="max-width: 420px; margin: 80px auto; padding: 32px;">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="font-weight: 700; font-size: 24px;">Create your account</h1>
        <p style="color: var(--text-muted); font-size: 13px;">Register to continue</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">


            <label class="form-label" for="business_name">Business name</label>
            <input type="text" id="business_name" name="business_name" required class="form-control" autofocus autocomplete="organization">
        </div>

        <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" required class="form-control" autocomplete="email">
        </div>



        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" required class="form-control" autocomplete="new-password">
        </div>

        <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" required class="form-control" autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary">Create account</button>

        <div style="margin-top: 14px; text-align:center; color: var(--text-muted); font-size: 13px;">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" style="color: rgba(255,255,255,0.95); text-decoration: none;">Sign in</a>
        </div>
    </form>
</div>
{% endblock %}
